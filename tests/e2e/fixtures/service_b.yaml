openapi: "3.0.0"
info:
  title: Orders API
  version: "1.0"
paths:
  /orders:
    get:
      operationId: listOrders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      operationId: getOrder
      responses:
        "200":
          description: An order
  /orders/{id}/items:
    get:
      operationId: getOrderItems
      responses:
        "200":
          description: Items of order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
  /health:
    get:
      operationId: healthB
      responses:
        "200":
          description: ok
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
        total:
          type: number
    Item:
      type: object
      properties:
        label:
          type: string
        price:
          type: number
